services:
  db:
    image: mongo:8
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo
      MONGO_INITDB_ROOT_PASSWORD: mongo
      MONGO_INITDB_DATABASE: dev
    ports:
      - "27017:27017"
    volumes:
      - ./devdb:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "'db.adminCommand(\"ping\")'"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3000
      DB_HOST: db
      DB_PORT: 27017
      DB_USER: mongo
      DB_PASSWORD: mongo
      DB_NAME: dev
      COOKIE_SECRET: "00000000000000000000000000000000"
      ADMIN_PASSWORD: "00000000000000000000000000000000"
    ports:
      - "4000:3000"
    volumes:
      - ./src:/app/src
      - ./tsconfig.json:/app/tsconfig.json
    depends_on:
      db:
        condition: service_healthy
    develop:
      watch:
        - path: ./src
          action: sync+restart
          target: /app/src
        - path: ./package.json
          action: rebuild
          target: /app/package.json
    restart: unless-stopped
